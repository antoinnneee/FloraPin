# Vhost nginx (hôte) pour FloraPin — florapin.pattounecorp.ovh
# ----------------------------------------------------------------------------
# Architecture (calquée sur memoires-cevenoles) :
#   Internet :443 ─▶ stream{} SNI router (nginx.conf)
#                      └─ SNI=florapin.pattounecorp.ovh ─▶ 127.0.0.1:9443 (ce vhost, terminaison TLS)
#                                                              └─ proxy_pass ─▶ 127.0.0.1:8088 (Caddy FloraPin, HTTP)
#   (Le port 80 public n'arrive pas sur ce nginx — certif émis en DNS-01.)

# --- Port 80 : redirection HTTPS (utile uniquement en accès local) ----------
server {
    listen 80;
    server_name florapin.pattounecorp.ovh;
    return 301 https://$host$request_uri;
}

# --- Terminaison TLS interne (atteinte uniquement via le SNI router :443) ----
server {
    listen 127.0.0.1:9443 ssl http2;
    server_name florapin.pattounecorp.ovh;

    ssl_certificate     /etc/letsencrypt/live/florapin.pattounecorp.ovh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/florapin.pattounecorp.ovh/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Uploads photos (PlantNet) — marge confortable.
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    access_log /var/log/nginx/florapin_access.log;
    error_log  /var/log/nginx/florapin_error.log;
}
