# Déploiement FloraPin (POC auto-hébergé) — API + PostgreSQL/PostGIS + MinIO
# + reverse-proxy Caddy (HTTPS automatique). Voir deploy/README.md.

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
      # Schéma puis seed appliqués au premier démarrage (base vide uniquement).
      # Ordre alphabétique : 01 schéma, puis 02 catalogue d'espèces (idempotent).
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../backend/db/seed-species.sql:/docker-entrypoint-initdb.d/02-seed-species.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      # Prod par défaut (le dev passe par docker-compose.override.yml) : masque
      # Swagger et applique les défauts durcis.
      NODE_ENV: ${NODE_ENV:-production}
      # Origines navigateur autorisées (CORS), liste séparée par des virgules.
      # Vide = aucune (l'app Android n'est pas un navigateur, CORS inopérant).
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Exposer Swagger /api/docs même en prod (diagnostic ponctuel).
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-}
      # Console /api/v1/admin/dashboard. Vide = endpoints de données désactivés.
      ADMIN_DASHBOARD_TOKEN: ${ADMIN_DASHBOARD_TOKEN:-}
      PORT: ${API_PORT:-3000}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900s}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      STORAGE_DRIVER: minio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-florapin}
      # Endpoint PUBLIC pour les URLs présignées (joignable par l'appareil) : le
      # host public de l'API, routé vers MinIO par le proxy sur /{bucket}/*. Sans
      # ça les URLs pointeraient vers `minio:9000` (interne) -> images illisibles
      # au pull depuis un autre appareil. Surchargeable via .env (autre domaine).
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-florapin.pattounecorp.ovh}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-443}
      MINIO_PUBLIC_USE_SSL: ${MINIO_PUBLIC_USE_SSL:-true}
      PLANTNET_API_KEY: ${PLANTNET_API_KEY:-}
      # Notifications push Firebase Cloud Messaging. La clé privée reste dans
      # deploy/.env sur le VPS et n'est jamais copiée dans l'image.
      PUSH_DRIVER: ${PUSH_DRIVER:-stub}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_CLIENT_EMAIL: ${FCM_CLIENT_EMAIL:-}
      FCM_PRIVATE_KEY: ${FCM_PRIVATE_KEY:-}

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - minio
    ports:
      # HTTP seulement : le TLS est assuré par le nginx de l'hôte, qui
      # proxifie vers ce port. (HTTP_PORT publié sur l'hôte, ex. 8088.)
      - "${HTTP_PORT:-80}:80"
    environment:
      DOMAIN: ${DOMAIN}
      # Cible interne du reverse-proxy (doit matcher le PORT de l'API).
      API_PORT: ${API_PORT:-3000}
      # Nom du bucket : sert à router /{bucket}/* vers MinIO (URLs présignées).
      MINIO_BUCKET: ${MINIO_BUCKET:-florapin}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Build statique de la vitrine (à produire : npm --prefix ../landing run build).
      - ../landing/dist:/srv/landing:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  minio-data:
  caddy-data:
  caddy-config:
