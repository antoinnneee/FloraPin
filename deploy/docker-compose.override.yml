# Surcharge DEV LOCAL (chargée automatiquement par docker compose).
# Publie les ports de l'infra (db, minio) vers l'hôte pour pouvoir lancer
# l'API en local avec `npm run start:dev` (scénario B.2 de docs/RUNNING.md).
#
# En PRODUCTION (tout dockerisé), lancer SANS cet override :
#   docker compose -f docker-compose.yml up -d
# afin de ne PAS exposer la base/MinIO sur l'hôte.

services:
  db:
    ports:
      - "${DB_HOST_PORT:-5432}:5432"

  minio:
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"           # API S3
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"   # console web
