# Vhost nginx (hôte) — FloraPin — PHASE 1 (HTTP seul, pour obtenir le certif).
# Sert le challenge Let's Encrypt depuis le webroot partagé. Une fois le certif
# obtenu, on remplace ce fichier par deploy/nginx-florapin.conf (qui ajoute la
# terminaison TLS sur 127.0.0.1:9443).
server {
    listen 80;
    server_name florapin.pattounecorp.ovh;

    location /.well-known/acme-challenge/ {
        root /home/meow-server/meownopoly/asset_server/public;
    }

    # En attendant le certif : on sert directement FloraPin en HTTP.
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
